<!DOCTYPE html>
<html>
<head>
  <title>Queue System</title>
  <style>
    body{font-family:sans-serif;max-width:500px;margin:auto;padding:20px;}
    input, button{width:100%;padding:10px;margin:5px 0;}
    #result{margin-top:20px;font-weight:bold;}
  </style>
</head>
<body>
<h2>Queue Registration</h2>
<p>Contact: +60XXXXXXXXX</p>

<form id="queueForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <input type="text" id="remark" placeholder="Remark (Optional)">
  <button type="submit">Get Queue Number</button>
</form>

<div id="result"></div>

<script>
const backendURL = "https://script.google.com/macros/s/AKfycbw1yNyJ8d3o6CwHXLKWC7_b9URa0rt3WQZlHskK8BLOeGWK_ShxpdnVDx5Bg9MccA_7Ow/exec";
const allowedLat = 3.0781696174154285;
const allowedLng = 101.61184618972615;
let myQueueNumber = null;

function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

document.getElementById("queueForm").addEventListener("submit", function(e){
  e.preventDefault();
  if(!navigator.geolocation){ alert("Geolocation not supported!"); return; }

  navigator.geolocation.getCurrentPosition(async function(pos){
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const dist = getDistance(lat,lng,allowedLat,allowedLng);

    if(dist > 1){ alert("You must be within 1 km."); return; }

    const deviceID = localStorage.getItem("deviceID") || crypto.randomUUID();
    localStorage.setItem("deviceID", deviceID);

    const data = {
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      remark: document.getElementById("remark").value,
      deviceID,
      latitude: lat,
      longitude: lng
    };

    const resp = await fetch(backendURL,{method:"POST", body:JSON.stringify(data)});
    const res = await resp.json();

    if(res.status==="success"){
      myQueueNumber = res.queueNumber;
      document.getElementById("result").innerHTML = "Your queue number: "+myQueueNumber;

      if(Notification.permission==="granted"){
        new Notification("Queue Submitted",{body:"Your number: "+myQueueNumber});
      } else { Notification.requestPermission(); }

    } else { alert(res.message); }
  });
});

setInterval(async ()=>{
  if(!myQueueNumber) return;
  const resp = await fetch(backendURL+"?action=getQueue");
  const data = await resp.json();
  const nextNumber = data.find(q=>q.status==="next");
  if(nextNumber && nextNumber.queueNumber === myQueueNumber){
    if(Notification.permission==="granted"){
      new Notification("Your turn is next!", {body:"Please get ready"});
    }
  }
},5000);
</script>
</body>
</html>
